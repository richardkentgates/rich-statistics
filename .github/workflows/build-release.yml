name: Build Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 1.0.1) — leave blank to use tag'
        required: false

jobs:
  build:
    name: Build plugin ZIP
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Verify PHP syntax
        run: |
          find . -name "*.php" \
            -not -path "./vendor/freemius/languages/*" \
            | xargs -I{} php -l "{}"

      - name: Create plugin ZIP
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ZIP_NAME="rich-statistics-${VERSION}.zip"
          mkdir -p build

          zip -r "build/${ZIP_NAME}" . \
            --exclude="*.git*" \
            --exclude="*.github*" \
            --exclude="*/tests/*" \
            --exclude="*/bin/*" \
            --exclude="*/build/*" \
            --exclude="*/docs/*" \
            --exclude="composer.json" \
            --exclude="composer.lock" \
            --exclude="phpunit.xml.dist" \
            --exclude=".gitignore" \
            --exclude=".gitattributes" \
            --exclude="*.gitkeep" \
            --exclude="*.sh" \
            --exclude="CONTRIBUTING.md" \
            --exclude="SECURITY.md" \
            --exclude="README.md"

          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT
          echo "ZIP created: build/${ZIP_NAME}"
          unzip -l "build/${ZIP_NAME}" | tail -20
        id: zip

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: rich-statistics-${{ steps.version.outputs.version }}
          path: build/rich-statistics-${{ steps.version.outputs.version }}.zip
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/rich-statistics-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          body: |
            ## Rich Statistics ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/richardkentgates/rich-statistics/blob/main/CHANGELOG.md) for details.

            ### Upload to Freemius
            Download the ZIP above and upload it at:
            https://dashboard.freemius.com → Your Plugin → Versions → Add New Version

  # ---------------------------------------------------------------------------
  # Ping the app server webhook to pull & deploy docs/app/ from GitHub.
  # No SSH key needed — server pulls public repo itself.
  # Requires GitHub secret: DEPLOY_WEBHOOK_TOKEN  (a random string you choose,
  # e.g.  openssl rand -hex 32)
  # The same string must be stored on the server in /etc/rsa-webhook-token
  # (chmod 640, chown root:www-data).
  # ---------------------------------------------------------------------------
  # ---------------------------------------------------------------------------
  # Build native Linux desktop app (.deb) for amd64 and arm64.
  # Tauri wraps the existing PWA (docs/app/) in a native WebKitGTK window.
  # Artifacts are renamed to stable filenames so /releases/latest/download/ URLs work.
  # ---------------------------------------------------------------------------
  build-desktop:
    name: Linux desktop (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-24.04
            arch: amd64
          - runner: ubuntu-24.04-arm
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stamp version
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" src-tauri/tauri.conf.json
          sed -i "s/^version = \"[^\"]*\"/version = \"${VERSION}\"/" src-tauri/Cargo.toml

      - name: Add version to bundled versions.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          python3 - <<EOF
import json, pathlib
p = pathlib.Path("docs/app/versions.json")
versions = json.loads(p.read_text())
if "${VERSION}" not in versions:
    versions.append("${VERSION}")
p.write_text(json.dumps(sorted(versions, key=lambda v: list(map(int, v.split("."))))))
EOF

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            librsvg2-dev \
            patchelf \
            file

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      - name: Build .deb
        run: tauri build
        working-directory: src-tauri
        env:
          CI: true
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Stage artifact
        run: |
          DEB=$(ls src-tauri/target/release/bundle/deb/*.deb | head -1)
          cp "${DEB}" "rich-statistics-linux-${{ matrix.arch }}.deb"
          # Copy detached signature produced by tauri-plugin-updater signing
          SIG=$(ls src-tauri/target/release/bundle/deb/*.deb.sig 2>/dev/null | head -1)
          [ -n "${SIG}" ] && cp "${SIG}" "rich-statistics-linux-${{ matrix.arch }}.deb.sig" || true

      - name: Upload .deb to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            rich-statistics-linux-${{ matrix.arch }}.deb
            rich-statistics-linux-${{ matrix.arch }}.deb.sig

  ping-deploy:
    name: Trigger web app update
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Ping deploy webhook
        run: |
          curl -fsS -X POST \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_WEBHOOK_TOKEN }}" \
            https://rs-app.richardkentgates.com/_deploy/
