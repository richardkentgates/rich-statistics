name: Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -----------------------------------------------------------------------
  # Unit tests — no WordPress install required, fast feedback
  # -----------------------------------------------------------------------
  unit:
    name: Unit tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run unit tests
        run: composer test -- --testsuite unit

  # -----------------------------------------------------------------------
  # Integration tests — need WordPress + MySQL
  # -----------------------------------------------------------------------
  integration:
    name: Integration tests (PHP ${{ matrix.php }}, WP ${{ matrix.wp }})
    runs-on: ubuntu-latest
    continue-on-error: true   # WP integration environment is non-trivial; don't block CI

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.1', '8.2' ]
        wp:  [ 'latest', '6.4' ]

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_tests
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, pdo, pdo_mysql, mysqli
          coverage: none

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Install Subversion (for WP test suite download)
        run: sudo apt-get install -y subversion

      - name: Install WordPress test suite
        run: |
          bash bin/install-wp-tests.sh wordpress_tests root root 127.0.0.1 ${{ matrix.wp }}
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib

      - name: Run integration tests
        id: run_integration
        run: |
          vendor/bin/phpunit --configuration phpunit.integration.xml --no-coverage \
            --testsuite integration --verbose 2>&1 | tee /tmp/phpunit-integration.txt
          exit ${PIPESTATUS[0]}
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib

      - name: Show integration test output on failure
        if: failure()
        run: tail -80 /tmp/phpunit-integration.txt

  # -----------------------------------------------------------------------
  # PHP syntax lint (fast, runs in parallel)
  # -----------------------------------------------------------------------
  lint:
    name: PHP lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Check PHP syntax
        run: find . -name "*.php" \
               -not -path "./vendor/*" \
               -not -path "./freemius/*" \
               | xargs -I{} php -l "{}"
